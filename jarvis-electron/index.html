<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JARVIS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="jarvis-ui">
    <div id="sound-wave"></div>
    <div id="response">Готов к работе. Произнесите "Джарвис"...</div>
     <div id="controls" style="position: absolute; top: 10px; right: 10px;">
        <button id="close-btn" style="background: red; color: white; border: none; border-radius: 50%; width: 25px; height: 25px;">×</button>
      </div>
        <script>
          const { ipcRenderer } = require('electron');
          window.ipcRenderer = ipcRenderer;
        </script>
      <script>
        document.getElementById('close-btn').addEventListener('click', () => {
          window.ipcRenderer.send('close-window', 'main');
        });
</script>
    </div>
  </div>
  <script src="renderMain.js"></script>
</body>
</html>
