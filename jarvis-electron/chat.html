<!DOCTYPE html>
<html>
<head>
    <meta charaset="UTF-8">
    <title>JARVIS Chat</title>
    <link rel="stylesheet" href="stule.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
    /* Стили для чата */
    body {
      background: rgba(10, 10, 20, 0.8);
      color: #00ff00;
      font-family: 'Orbitron', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #chat-container {
      height: 85vh;
      padding: 20px;
      overflow-y: auto;
      border-bottom: 1px solid #00ff00;
    }
    #input-container {
      display: flex;
      padding: 10px;
    }
    #user-input {
      flex-grow: 1;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00ff00;
      color: #00ff00;
      padding: 10px;
      font-family: 'Orbitron', sans-serif;
    }
    #send-btn, #voice-btn {
      background: rgba(0, 255, 0, 0.2);
      border: 1px solid #00ff00;
      color: #00ff00;
      margin-left: 10px;
      cursor: pointer;
    }
    .message {
      margin-bottom: 15px;
      line-height: 1.4;
    }
    .user-message {
      color: #ffffff;
    }
    .jarvis-message {
      color: #00ff00;
    }
    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
    }
    #close-btn {
      background: transparent;
      border: none;
      color: #ff0000;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="jarvis-chat">
    <!-- Кнопка закрытия -->
    <div id="controls">
      <button id="close-btn">×</button>
    </div>

    <!-- История сообщений -->
    <div id="chat-container">
      <div class="message jarvis-message">
        JARVIS: Система активирована. Чем могу помочь?
      </div>
    </div>



  <script>
    // Подключение Socket.IO
    const socket = io('http://localhost:5000');

    // Элементы интерфейса
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const voiceBtn = document.getElementById('voice-btn');
    const closeBtn = document.getElementById('close-btn');

    // Отправка сообщения
    function sendMessage() {
      const message = userInput.value.trim();
      if (message) {
        addMessage('Вы', message, 'user-message');
        socket.emit('user_message', { text: message });
        userInput.value = '';
      }
    }

    // Добавление сообщения в чат
    function addMessage(sender, text, className) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${className}`;
      messageDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Голосовой ввод
    voiceBtn.addEventListener('click', () => {
      if (!('webkitSpeechRecognition' in window)) {
        alert('Голосовой ввод не поддерживается в вашем браузере!');
        return;
      }

      const recognition = new webkitSpeechRecognition();
      recognition.lang = 'ru-RU';

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        userInput.value = transcript;
        sendMessage();
      };

      recognition.start();
    });

    // Кнопка отправки
    sendBtn.addEventListener('click', sendMessage);

    // Enter для отправки
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Закрытие чата
    closeBtn.addEventListener('click', () => {
      window.ipcRenderer.send('close-chat');
    });

    // Получение ответа от JARVIS
    socket.on('jarvis_message', (data) => {
      addMessage('JARVIS', data.text, 'jarvis-message');
    });
  </script>
</body>
</html>
