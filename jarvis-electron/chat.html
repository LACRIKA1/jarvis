<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JARVIS Chat</title>
  <link rel="stylesheet" href="chat.css">
  <script>
    const { ipcRenderer } = require('electron')
    window.ipcRenderer = ipcRenderer
  </script>
</head>
<body>
  <!-- Исправлено id на animated-border -->
  <div id="animated-border"></div>
  <button id="close-btn">×</button>
  
  <div id="chat-container">
    <div class="message jarvis-message">
      JARVIS: Система активирована. Чем могу помочь?
    </div>
  </div>

  <div id="input-container">
    <input type="text" id="user-input" placeholder="Введите сообщение...">
    <button id="send-btn">Отправить</button>
    <button id="voice-btn">🎤</button>
  </div>

  <script src="renderChat.js"></script>
</body>
</html>
